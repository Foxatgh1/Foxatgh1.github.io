<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: url('darktablebackground.png') repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .page-container {
      position: relative;
      width: min(100vw, 151.7vh);
      height: min(100vh, 65.91vw);
    }
    .page-container img.bg {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <img class="bg" src="comingsoonpage.png" alt="Writings">
  </div>
</body>
</html>
