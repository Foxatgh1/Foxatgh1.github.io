<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coleman Martinis – Resume</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .resume-container {
      position: relative;
      width: 800px;
      flex-shrink: 0;
    }
    .resume-container > img {
      width: 100%;
      display: block;
    }

    /* Hover zones */
    .zone {
      position: absolute;
      cursor: default;
    }
    .zone .highlight {
      position: absolute;
      inset: 0;
      background: rgba(255, 220, 0, 0);
      transition: background 0.2s;
      border-radius: 3px;
    }
    .zone:hover .highlight {
      background: rgba(255, 220, 0, 0.4);
    }
    .zone:hover .highlight.green {
      background: rgba(0, 200, 100, 0.35);
    }
    .zone:hover .highlight.blue {
      background: rgba(100, 180, 255, 0.4);
    }
    .zone:hover .highlight.red {
      background: rgba(255, 80, 80, 0.35);
    }
    .zone:hover .highlight.grey {
      background: rgba(180, 180, 180, 0.45);
    }
    .zone:hover .highlight.forest-green {
      background: rgba(34, 139, 34, 0.35);
    }
    .zone:hover .highlight.teal {
      background: rgba(0, 200, 200, 0.35);
    }
    .zone:hover .highlight.royal-blue {
      background: rgba(65, 105, 225, 0.35);
    }
    .zone:hover .highlight.gold {
      background: rgba(255, 210, 0, 0.45);
    }
    .zone:hover .highlight.purple {
      background: rgba(160, 80, 220, 0.35);
    }
    .zone:hover .highlight.orange {
      background: rgba(255, 140, 0, 0.4);
    }
    @keyframes rainbow-shift {
      0%   { background: rgba(255, 80, 80, 0.4); }
      16%  { background: rgba(255, 160, 0, 0.4); }
      33%  { background: rgba(255, 230, 0, 0.4); }
      50%  { background: rgba(0, 200, 80, 0.4); }
      66%  { background: rgba(0, 150, 255, 0.4); }
      83%  { background: rgba(160, 0, 255, 0.4); }
      100% { background: rgba(255, 80, 80, 0.4); }
    }
    .zone:hover .highlight.rainbow {
      animation: rainbow-shift 2s linear infinite;
    }
    #seeya-img {
      position: fixed;
      bottom: 0;
      left: 100px;
      width: 180px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .cougar-logo {
      position: absolute;
      right: calc(100% + 20px);
      top: 50%;
      width: 50px;
      transform: translateY(-50%) translateX(-400px);
      opacity: 0;
      transition: transform 0.7s cubic-bezier(0.1, 0.8, 0.15, 1.1), opacity 0.05s;
      pointer-events: none;
    }
    .zone:hover .cougar-logo {
      transform: translateY(-50%) translateX(0);
      opacity: 1;
    }
    #falling-leaf {
      position: fixed;
      width: 80px;
      pointer-events: none;
      z-index: 9999;
      display: none;
    }
    .zone:hover .highlight.pink {
      background: rgba(255, 180, 200, 0.5);
    }

    /* Floating emojis */
    .floater {
      position: absolute;
      font-size: 22px;
      opacity: 0;
      pointer-events: none;
      animation: none;
    }
    .zone:hover .floater {
      opacity: 1;
    }
    @keyframes float1 {
      0%   { transform: translate(0px, 0px) rotate(0deg); }
      25%  { transform: translate(-10px, -15px) rotate(-8deg); }
      50%  { transform: translate(8px, -25px) rotate(5deg); }
      75%  { transform: translate(-5px, -10px) rotate(-3deg); }
      100% { transform: translate(0px, 0px) rotate(0deg); }
    }
    @keyframes float2 {
      0%   { transform: translate(0px, 0px) rotate(0deg); }
      25%  { transform: translate(12px, -18px) rotate(10deg); }
      50%  { transform: translate(-8px, -28px) rotate(-6deg); }
      75%  { transform: translate(6px, -12px) rotate(4deg); }
      100% { transform: translate(0px, 0px) rotate(0deg); }
    }
    @keyframes float3 {
      0%   { transform: translate(0px, 0px) rotate(0deg); }
      33%  { transform: translate(-14px, -20px) rotate(-12deg); }
      66%  { transform: translate(10px, -30px) rotate(8deg); }
      100% { transform: translate(0px, 0px) rotate(0deg); }
    }
    .zone:hover .floater { animation-fill-mode: forwards; animation-iteration-count: infinite; animation-timing-function: ease-in-out; }
    .floater.f1 { animation-name: float1; animation-duration: 3s; animation-delay: 0s; }
    .floater.f2 { animation-name: float2; animation-duration: 3.5s; animation-delay: 0.3s; }
    .floater.f3 { animation-name: float3; animation-duration: 2.8s; animation-delay: 0.6s; }
    .floater.f4 { animation-name: float1; animation-duration: 4s; animation-delay: 0.9s; }
    .floater.f5 { animation-name: float2; animation-duration: 3.2s; animation-delay: 0.2s; }
    .floater.f6 { animation-name: float3; animation-duration: 3.7s; animation-delay: 0.5s; }
    .zone .tooltip {
      position: absolute;
      right: calc(100% + 12px);
      top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      font-family: 'Times New Roman', serif;
      font-size: 15px;
      color: #333;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .zone .tooltip .arrow {
      font-size: 20px;
      color: #555;
    }
    .zone:hover .tooltip {
      opacity: 1;
    }
    @media (max-width: 600px) {
      body { padding: 0; }
      .resume-container { width: 100%; }
      .zone, #seeya-img { display: none; }
    }
  </style>
</head>
<body>
  <div class="resume-container">
    <img src="resume.png" alt="Coleman Martinis Resume">

    <!-- Zone: Name -->
    <div class="zone" style="top: 0.31%; left: 35.3%; width: 29.3%; height: 2.8%;">
      <div class="highlight"></div>
      <div class="tooltip">
        <span>That's me!</span>
        <span class="arrow">→</span>
      </div>
    </div>

    <!-- Zone: Contact Info -->
    <div class="zone" style="top: 3.5%; left: 5.25%; width: 89.15%; height: 2.05%;">
      <div class="highlight green"></div>
      <div class="tooltip" style="right: auto; left: calc(100% - 8px); flex-direction: row-reverse; transform: translateY(calc(-50% - 2px));">
        <span style="position: relative; top: -2px; right: 5px;">Seriously though, if you are hiring...</span>
        <img src="arrow.png" style="width: 60px; transform: scaleY(-1); margin-top: -2px; margin-left: 10px;">
      </div>
    </div>

    <!-- Zone: BYU -->
    <div class="zone" style="top: 8.46%; left: 0%; width: 99.7%; height: 7.58%;">
      <div class="highlight blue"></div>
      <div class="tooltip" style="right: calc(100% + 11px);">
        <span style="font-size: 30px;">Rise and shout, baby!</span>
        <img src="foamfinger.png" style="width: 50px; transform: rotate(90deg);">
      </div>
    </div>

    <!-- Zone: Berkeley -->
    <div class="zone" style="top: 16.92%; left: 0%; width: 99.7%; height: 7.67%;">
      <div class="highlight red"></div>
      <div class="tooltip" style="right: auto; left: calc(100% + 12px); flex-direction: row;">
        <img src="redfinger.png" style="width: 60px;">
        <img src="imnotacommunist.png" style="width: 120px;">
      </div>
    </div>

    <!-- Zone: Pelion -->
    <div class="zone" style="top: 28.01%; left: 0%; width: 99.825%; height: 7.45%;">
      <div class="highlight grey"></div>
      <div class="tooltip" style="right: calc(100% + 12px); flex-direction: column; align-items: center; gap: 4px; transform: translateY(-50%);">
        <img src="pelionlogo.png" style="width: 120px;">
        <span style="font-size: 13px; letter-spacing: 2px;">↑ ↑ ↑</span>
        <span style="font-size: 13px;">They are the best!</span>
      </div>
    </div>

    <!-- Zone: Copeland -->
    <div class="zone" style="top: 36.78%; left: 0%; width: 99.825%; height: 9.7%;">
      <div class="highlight forest-green"></div>
      <div class="tooltip" style="right: auto; left: calc(100% + 12px); flex-direction: column; align-items: center; gap: 6px; white-space: normal; width: 150px;">
        <img src="copelandcompressor.png" style="width: 120px;">
        <span style="font-size: 13px; text-align: center;">Copeland manufactures these compressors, which are super important for your AC.</span>
      </div>
    </div>

    <!-- Zone: ACUF -->
    <div class="zone" style="top: 47.48%; left: 0%; width: 99.825%; height: 15.51%;">
      <div class="highlight pink"></div>
      <div class="tooltip" style="right: calc(100% + 42px); flex-direction: column; align-items: center; gap: 2px;">
        <div style="position: relative; display: flex; flex-direction: column; align-items: center; gap: 2px;">
          <span style="font-size: 22px; font-weight: bold;">BILLS!</span>
          <span style="font-size: 22px; font-weight: bold;">BILLS!</span>
          <span style="font-size: 22px; font-weight: bold;">BILLS!</span>
          <!-- Floating emojis -->
          <span class="floater f1" style="top: -6px; left: -30px;">💵</span>
          <span class="floater f2" style="top: 14px; left: -20px;">📄</span>
          <span class="floater f3" style="top: 34px; left: -35px;">💵</span>
          <span class="floater f4" style="top: -1px; right: -30px;">📄</span>
          <span class="floater f5" style="top: 24px; right: -25px;">💵</span>
          <span class="floater f6" style="top: 44px; right: -35px;">📄</span>
        </div>
      </div>
    </div>

    <!-- Zone: Pax Momentum -->
    <div class="zone" id="pax-zone" style="top: 63.99%; left: 0%; width: 99.825%; height: 9.64%; cursor: pointer;">
      <div class="highlight teal"></div>
      <div class="tooltip" style="right: auto; left: calc(100% + 12px); flex-direction: row; align-items: center; gap: 8px;">
        <span class="arrow">←</span>
        <span style="font-size: 16px;">Click me!</span>
      </div>
    </div>

    <!-- Zone: Last bullet (hobbies) -->
    <div class="zone" id="hobbies-zone" style="top: 97.21%; left: 0%; width: 99.825%; height: 1.82%;">
      <div class="highlight rainbow"></div>
    </div>

    <!-- Zone: Skills -->
    <div class="zone" style="top: 95.31%; left: 0%; width: 99.825%; height: 1.92%;">
      <div class="highlight orange"></div>
      <div class="tooltip" style="right: auto; left: calc(100% + 12px);">
        <span style="font-size: 15px;">NOT all-inclusive!</span>
      </div>
    </div>

    <!-- Zone: Eagle Scout -->
    <div class="zone" style="top: 91.77%; left: 0%; width: 99.825%; height: 3.62%;">
      <div class="highlight purple"></div>
      <div class="tooltip" style="right: calc(100% + 20px); flex-direction: column; align-items: center; gap: 2px; transform: translateY(-50%) rotate(-45deg);">
        <span style="font-family: 'Dancing Script', cursive; font-size: 28px; color: #222;">Charming</span>
        <span style="font-family: 'Times New Roman', serif; font-size: 16px; color: #222;">AND</span>
        <span style="font-family: 'Times New Roman', serif; font-size: 16px; color: #222;">Smart?!</span>
      </div>
    </div>

    <!-- Zone: Missionary -->
    <div class="zone" style="top: 84%; left: 0%; width: 99.825%; height: 4.03%;">
      <div class="highlight gold"></div>
      <div class="tooltip" style="right: auto; left: calc(100% + 12px);">
        <img src="scripture.png" style="width: 280px;">
      </div>
    </div>

    <!-- Zone: Cougar Capital -->
    <div class="zone" style="top: 77.04%; left: 0%; width: 99.825%; height: 5.85%;">
      <div class="highlight royal-blue"></div>
      <img src="ccbyulogo.jpeg" class="cougar-logo" alt="Cougar Capital">
    </div>

  </div>


  <img id="seeya-img" src="seeya.png" alt="Seeya!">

  <script>
    const seeyaImg = document.getElementById('seeya-img');
    const hobbiesZone = document.getElementById('hobbies-zone');
    hobbiesZone.addEventListener('mouseenter', () => seeyaImg.style.opacity = '1');
    hobbiesZone.addEventListener('mouseleave', () => seeyaImg.style.opacity = '0');
  </script>

  <script>
    let leafCount = 0;
    const leafSrcs = ['fallingleaf.png', 'fallingleaf2.png'];

    document.getElementById('pax-zone').addEventListener('click', function() {
      const leaf = document.createElement('img');
      leaf.src = leafSrcs[leafCount % 2];
      leafCount++;
      leaf.style.cssText = 'position:fixed; width:80px; pointer-events:none; z-index:9999; transition:opacity 2s;';
      document.body.appendChild(leaf);

      const startX = Math.random() * (window.innerWidth - 100);
      let y = -100;
      let x = startX;
      let rotation = Math.random() * 360;
      const speed = 2.5;
      let time = 0;

      leaf.style.top = y + 'px';
      leaf.style.left = x + 'px';

      function animate() {
        time += 0.03;
        y += speed;
        x = startX + Math.sin(time * 1.5) * 60 + Math.sin(time * 0.7) * 30;
        rotation += Math.sin(time) * 3;

        leaf.style.top = y + 'px';
        leaf.style.left = x + 'px';
        leaf.style.transform = 'rotate(' + rotation + 'deg)';

        if (y < window.innerHeight - 90) {
          requestAnimationFrame(animate);
        } else {
          leaf.style.top = (window.innerHeight - 90) + 'px';
        }
      }

      requestAnimationFrame(animate);

      // Fade out and remove after 15 seconds
      setTimeout(function() {
        leaf.style.opacity = '0';
        setTimeout(function() { leaf.remove(); }, 2000);
      }, 15000);
    });
  </script>

</body>
</html>
