<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <title>Arm Yourself</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: url('assets/greenstarrywallpaper.png') repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .shelf-container {
      position: relative;
      /* Maintain 3:2 aspect ratio, fill as much viewport as possible */
      width: min(100vw, 150vh);
      height: min(100vh, 66.67vw);
    }
    .shelf-container img.bg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .book {
      position: absolute;
      cursor: pointer;
    }
    .book img {
      height: 100%;
      width: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="shelf-container">
    <img class="bg" src="assets/bookshelves.png" alt="Bookshelf">

    <!-- Chess Knight -->
    <a class="book" href="https://www.chess.com" target="_blank" style="right: 17.4%; top: 23.31%; height: 8.75%;">
      <img src="assets/chessknight.png" alt="Chess.com">
    </a>

    <!-- iNaturalist Terrarium -->
    <a class="book" href="https://www.inaturalist.org" target="_blank" style="left: 28.07%; top: 6.89%; height: 35%; z-index: 10;">
      <img src="assets/inaturalistterrarium.png" alt="iNaturalist">
    </a>

    <!-- Wayback Machine -->
    <a class="book" href="https://web.archive.org" target="_blank" style="right: 20.38%; top: 16.32%; height: 15%;">
      <img src="assets/waybackmachinefloppy.png" alt="Wayback Machine">
    </a>

    <!-- Card Box Other Sites -->
    <a class="book" href="#" target="_blank" style="right: 5.33%; top: 19.33%; height: 12%;">
      <img src="assets/cardboxothersites.png" alt="Other Cool Sites">
    </a>

    <!-- Congress.gov Poster -->
    <a class="book" href="https://www.congress.gov" target="_blank" style="right: 39.63%; top: 8.88%; height: 25%; transform: rotate(-3deg);">
      <img src="assets/congressgovposter.png" alt="Congress.gov">
    </a>

    <!-- iFixit -->
    <a class="book" href="https://www.ifixit.com" target="_blank" style="right: 2%; top: 31.09%; height: 10%;">
      <img src="assets/ifixitbook.png" alt="iFixit">
    </a>

    <!-- Return to Desk sticker -->
    <a class="book" href="index.html" style="left: 10%; top: 5.55%; height: 5.6%; z-index: 20; transform: rotate(-5deg);">
      <img src="assets/returnsticker.png" alt="Return to Desk">
    </a>

    <!-- Fox click zone (What Does the Fox Say) -->
    <a href="https://www.youtube.com/watch?v=q-Y0bnx6Ndw" target="_blank" style="position: absolute; display: block; left: 3.48%; top: 34.89%; width: 45px; height: 40px; background: transparent; border-radius: 3px; z-index: 20;"></a>

    <!-- Brain click zone (Project Euler) -->
    <a href="https://projecteuler.net" target="_blank" style="position: absolute; display: block; left: 3.85%; top: 27.55%; width: 40px; height: 40px; background: transparent; border-radius: 3px; z-index: 20;"></a>

    <!-- Acorn click zone (GrowVeg) -->
    <a href="https://www.growveg.com/plants/us-and-canada/" target="_blank" style="position: absolute; display: block; left: 3.85%; top: 6%; width: 40px; height: 40px; background: transparent; border-radius: 3px; z-index: 20;"></a>

    <!-- ABC click zone (Google Fonts) -->
    <a href="https://fonts.google.com" target="_blank" style="position: absolute; display: block; left: 3.85%; top: 20.33%; width: 40px; height: 42px; background: transparent; border-radius: 3px; z-index: 20;"></a>

    <!-- Dice click zone (random.org) -->
    <a href="https://www.random.org" target="_blank" style="position: absolute; display: block; left: 3.85%; top: 13%; width: 40px; height: 40px; background: transparent; border-radius: 3px; z-index: 20;"></a>

    <!-- Books and note -->
    <a class="book" href="#" style="left: 1.74%; top: 5%; height: 36.1%;">
      <img src="assets/booksandnote.png" alt="Books and note">

    </a>

    </a>

    <a class="book" href="https://wikisource.org" target="_blank" style="right: calc(2% + 7.15% + 7.15% + 7.14% + 7.26% + 7.43% + 7.41% + 7.57%); bottom: 5.1%; height: 48%;">
      <img src="assets/wikisourcebook.png" alt="Wikisource">
    </a>

    <!-- OneLook -->
    <a class="book" href="https://www.onelook.com" target="_blank" style="right: calc(2% + 7.15% + 7.15% + 7.14% + 7.26% + 7.43% + 7.41% + 7.57% + 7.44%); bottom: 5.1%; height: 48%;">
      <img src="assets/onelookbook.png" alt="OneLook">
    </a>

    <!-- OpenSecrets -->
    <a class="book" href="https://www.opensecrets.org" target="_blank" style="right: calc(2% + 7.15% + 7.15% + 7.14% + 7.26% + 7.43% + 7.41% + 7.57% + 7.44% + 7.49%); bottom: 5.1%; height: 48%;">
      <img src="assets/opensecretsbook.png" alt="OpenSecrets">
    </a>

    <!-- National Gallery of Art -->
