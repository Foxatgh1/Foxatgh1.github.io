<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coleman.rocks</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      background: url('background.png') center center / cover no-repeat;
    }
    .draggable {
      position: absolute;
      cursor: grab;
      user-select: none;
    }
    .draggable:active {
      cursor: grabbing;
    }
    .draggable img {
      display: block;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="draggable" data-href="about.html" style="left: 80px; top: 80px;">
    <img src="aboutcolemanpolaroid.png" alt="About Coleman" style="width: 220px;">
  </div>

  <div class="draggable" data-href="armyourself.html" style="left: 800px; top: 80px;">
    <img src="armyourselfbook.png" alt="Arm Yourself" style="width: 220px;">
  </div>

  <script>
    let highestZ = 10;

    document.querySelectorAll('.draggable').forEach(el => {
      el.addEventListener('mousedown', e => {
        e.preventDefault();

        highestZ++;
        el.style.zIndex = highestZ;

        const startX = e.clientX - el.offsetLeft;
        const startY = e.clientY - el.offsetTop;
        let dragged = false;

        function onMove(e) {
          dragged = true;
          el.style.left = (e.clientX - startX) + 'px';
          el.style.top  = (e.clientY - startY) + 'px';
        }

        function onUp() {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          if (!dragged && el.dataset.href) {
            window.location.href = el.dataset.href;
          }
        }

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    });
  </script>

</body>
</html>
