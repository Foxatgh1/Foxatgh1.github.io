<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <title>coleman.rocks</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      background: url('assets/background.png') center center / cover no-repeat;
    }
    .draggable {
      position: absolute;
      cursor: grab;
      user-select: none;
    }
    .draggable:active {
      cursor: grabbing;
    }
    .draggable img {
      display: block;
      pointer-events: none;
    }

    /* Mobile layout */
    .mobile-only { display: none; }

    @media (max-width: 600px) {
      html, body {
        height: auto;
        overflow: auto;
      }
      .desktop-only { display: none; }
      .mobile-only {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 82px 20px 48px;
        gap: 32px;
      }
      .mobile-only img.wordmark {
        width: 80%;
        max-width: 320px;
      }
      .mobile-only a img {
        width: 70vw;
        max-width: 280px;
        display: block;
      }
    }
  </style>
</head>
<body>

  <!-- Desktop: draggable items -->
  <div class="desktop-only">
    <div class="draggable" data-href="about.html" style="left: 6%; top: 9%;">
      <img src="assets/aboutcolemanpolaroid.png" alt="About Coleman" style="width: min(220px, 28vw);">
    </div>

    <div class="draggable" data-href="armyourself.html" style="left: 57%; top: 9%;">
      <img src="assets/armyourselfbook.png" alt="Arm Yourself" style="width: min(220px, 28vw);">
    </div>

    <div class="draggable" data-href="oldprojects.html" style="left: 29%; top: 33%;">
      <img src="assets/oldprojects.png" alt="Old Projects" style="width: min(220px, 28vw);">
    </div>
  </div>

  <!-- Mobile: stacked layout -->
  <div class="mobile-only">
    <img class="wordmark" src="assets/colemanrocks-wordmark.png" alt="coleman.rocks">
    <a href="about.html"><img src="assets/aboutcolemanpolaroid.png" alt="About Coleman"></a>
    <a href="armyourself.html"><img src="assets/armyourselfbook.png" alt="Arm Yourself"></a>
    <a href="oldprojects.html"><img src="assets/oldprojects.png" alt="Old Projects"></a>
  </div>

  <script>
    document.querySelectorAll('.draggable').forEach(el => {
      let highestZ = 10;

      el.addEventListener('mousedown', e => {
        e.preventDefault();
        highestZ++;
        el.style.zIndex = highestZ;
        const startX = e.clientX - el.offsetLeft;
        const startY = e.clientY - el.offsetTop;
        let dragged = false;
        function onMove(e) {
          dragged = true;
          el.style.left = (e.clientX - startX) + 'px';
          el.style.top  = (e.clientY - startY) + 'px';
        }
        function onUp() {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          if (!dragged && el.dataset.href) window.location.href = el.dataset.href;
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });

      el.addEventListener('touchstart', e => {
        e.preventDefault();
        highestZ++;
        el.style.zIndex = highestZ;
        const touch = e.touches[0];
        const startX = touch.clientX - el.offsetLeft;
        const startY = touch.clientY - el.offsetTop;
        let dragged = false;
        function onMove(e) {
          dragged = true;
          const t = e.touches[0];
          el.style.left = (t.clientX - startX) + 'px';
          el.style.top  = (t.clientY - startY) + 'px';
        }
        function onEnd() {
          el.removeEventListener('touchmove', onMove);
          el.removeEventListener('touchend', onEnd);
          if (!dragged && el.dataset.href) window.location.href = el.dataset.href;
        }
        el.addEventListener('touchmove', onMove, { passive: false });
        el.addEventListener('touchend', onEnd);
      }, { passive: false });
    });
  </script>

</body>
</html>
